<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Little World Inside...</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/projects.css" />
    <link rel="stylesheet" href="css/btn.css" />
    <script src="js/theme.js" defer></script>
    <script src="js/projects.js" defer></script>
    <script src="js/script.js" defer></script>
</head>

<body class="light-mode">
    <header>
        <a class="header-name" href="/">khoan</a>
        <nav class="header-actions" aria-label="Primary navigation">
            <button id="projects-toggle" class="btn">Projects</button>
            <button id="blogs-toggle" class="btn">Blogs</button>
            <button id="theme-toggle" class="btn">☀️ Light Mode</button>
            <button id="contact-toggle" class="btn">Contact</button>
        </nav>
    </header>

    <div class="main-text">
        <main>
            <section class="intro">
                <h1>Hi there, I'm Khoa.</h1>
                <p>I am learning by doing.</p>
                <ul class="skill-list" aria-label="Core skills">
                    <li class="skill-pill">JS/TS</li>
                    <li class="skill-pill">Docker</li>
                    <li class="skill-pill">Git</li>
                    <li class="skill-pill">Node.js</li>
                    <li class="skill-pill">C#/.NET-Windows Forms</li>
                </ul>
            </section>
            <section id="projects" class="section">
                <div class="section-heading">
                    <h2>Projects</h2>
                    <p>A few projects that I've worked on.</p>
                </div>
                <div id="projects-list" class="project-grid" aria-live="polite"></div>
            </section>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </main>
    </div>
</body>

</html>
