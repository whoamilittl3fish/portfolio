<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Projects • Little World Inside...</title>
    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = storedTheme === 'dark' || storedTheme === 'light'
                    ? storedTheme
                    : (prefersDark ? 'dark' : 'light');
                document.documentElement.dataset.theme = theme;
            } catch (error) {
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.js"></script>
</head>

<body>
    <header>
        <a class="header-name" href="/">khoan</a>
        <nav class="header-actions" aria-label="Primary navigation">
            <a class="btn" href="/">Home</a>
            <a class="btn" href="projects.html" id="projects-toggle" aria-current="page">Projects</a>
            <button id="theme-toggle" class="btn" type="button">☀️ Light Mode</button>
            <a class="btn" href="blogs.html" id="blogs-toggle">Blogs</a>
            <a class="btn" href="/#contact" id="contact-toggle">Contact</a>
        </nav>
    </header>

    <div class="main-text">
        <main>
            <section id="projects" class="section">
                <div class="section-heading">
                    <h1>Projects</h1>
                    <p>A few projects that I've worked on.</p>
                </div>
                <div id="projects-list" class="project-grid" aria-live="polite"></div>
            </section>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </main>
    </div>
</body>

</html>
