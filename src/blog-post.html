<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blog Post • Little World Inside...</title>
    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = storedTheme === 'dark' || storedTheme === 'light'
                    ? storedTheme
                    : (prefersDark ? 'dark' : 'light');
                document.documentElement.dataset.theme = theme;
            } catch (error) {
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/loading.css" />
    <link rel="stylesheet" href="/css/btn.css" />
    <link rel="stylesheet" href="/css/blog-post.css" />
    <script src="/js/theme.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="/js/blog-detail.js" defer></script>
</head>

<body data-default-lang="en">
    <header>
        <a class="header-name" href="/">khoan</a>
        <nav class="header-actions" aria-label="Primary navigation">
            <a class="btn" href="/">Home</a>
            <a class="btn" href="/projects.html" id="projects-toggle">Projects</a>
            <button id="theme-toggle" class="btn" type="button">☀️ Light Mode</button>
            <a class="btn" href="/blogs.html" id="blogs-toggle" aria-current="page">Blogs</a>
            <a class="btn" href="/#contact" id="contact-toggle">Contact</a>
        </nav>
    </header>

    <main class="page">
        <div class="page__container blog-article">
            <header class="blog-article__header">
                <a class="blog-back-link" href="/blogs.html">Back to all posts</a>
                <h1 data-blog-title>Loading title…</h1>
                <p class="blog-card__summary" data-blog-summary></p>
                <div class="blog-article__meta">
                    <span data-blog-date></span>
                    <div data-blog-tags class="blog-card__tags"></div>
                    <div class="lang-switcher" data-lang-switcher hidden></div>
                </div>
            </header>

            <section class="blog-content" id="blog-content" aria-live="polite">
                <p>Loading article…</p>
            </section>
        </div>
    </main>
</body>

</html>
